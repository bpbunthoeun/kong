apiVersion: v1
kind: Pod
metadata:
  name: dns-test-pod
  namespace: sso-dev
spec:
  containers:
  - name: busybox
    image: busybox
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
    command: ["sh", "-c", "while true; do sleep 3600; done"]
  restartPolicy: Never